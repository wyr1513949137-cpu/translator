<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>英文 → 中文 同声传译</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f4f4f2; color: #1a1a1a;
  min-height: 100vh; display: flex;
  align-items: flex-start; justify-content: center;
  padding: 2rem 1rem;
}
.wrap { width: 100%; max-width: 680px; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 13px; color: #999; margin-bottom: 2rem; }
.start-btn {
  width: 100%; padding: 16px; font-size: 16px; font-weight: 500;
  border-radius: 12px; border: none; background: #1a1a1a; color: #fff;
  cursor: pointer; margin-bottom: 1.5rem; transition: background 0.15s;
}
.start-btn:hover { background: #333; }
.start-btn.on { background: #c0392b; }
.start-btn.on:hover { background: #e74c3c; }
.status-bar {
  display: none; align-items: center; gap: 10px;
  font-size: 13px; color: #888; margin-bottom: 1.25rem;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: #c0392b; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.latest {
  background: #fff; border: 1px solid #e0e0da;
  border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem;
}
.latest.done { border-color: #a0c4f0; background: #f0f6fe; }
.latest-lbl { font-size: 12px; color: #aaa; margin-bottom: 10px; letter-spacing: 0.04em; }
.latest.done .latest-lbl { color: #3b6fd4; }
.en-txt { font-size: 14px; color: #555; margin-bottom: 8px; line-height: 1.6; min-height: 22px; }
.zh-txt { font-size: 18px; color: #1a1a1a; font-weight: 500; line-height: 1.7; min-height: 28px; }
.en-txt.empty, .zh-txt.empty { color: #ccc; font-style: italic; font-weight: 400; font-size: 13px; }
.divider { border: none; border-top: 1px solid #e8e8e4; margin: 8px 0; }
.err {
  font-size: 13px; color: #a33; background: #fceaea;
  border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem;
  display: none; line-height: 1.6;
}
.history { display: none; margin-top: 0.5rem; }
.history-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.history-lbl { font-size: 12px; color: #aaa; }
.clr { font-size: 12px; color: #aaa; background: none; border: none; cursor: pointer; }
.clr:hover { color: #666; }
.hlist { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
.hitem { background: #fff; border: 1px solid #e8e8e4; border-radius: 10px; padding: 10px 12px; }
.h-en { font-size: 13px; color: #888; margin-bottom: 4px; line-height: 1.5; }
.h-zh { font-size: 14px; color: #1a1a1a; font-weight: 500; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">
  <h1>英文 → 中文 同声传译</h1>
  <p class="sub">完全免费 · 无需任何 API Key · 说英文自动翻译成中文</p>

  <div class="err" id="errMsg"></div>

  <button class="start-btn" id="startBtn" onclick="toggle()">开启同声传译</button>

  <div class="status-bar" id="statusBar">
    <div class="dot"></div>
    <span id="statusTxt">正在监听，请说英文...</span>
  </div>

  <div class="latest" id="latestBox">
    <div class="latest-lbl">当前翻译</div>
    <div class="en-txt empty" id="enTxt">等待说话...</div>
    <hr class="divider"/>
    <div class="zh-txt empty" id="zhTxt">中文翻译显示在这里...</div>
  </div>

  <div class="history" id="histEl">
    <div class="history-hd">
      <div class="history-lbl">翻译记录</div>
      <button class="clr" onclick="clearHist()">清除</button>
    </div>
    <div class="hlist" id="hList"></div>
  </div>
</div>

<script>
let sr = null;
let isOn = false;
let history = [];
let translateTimer = null;

function toggle() {
  if (isOn) stop();
  else start();
}

function start() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showErr('此浏览器不支持语音识别，请使用 Chrome 浏览器');
    return;
  }
  hideErr();
  sr = new SR();
  sr.lang = 'en-AU';
  sr.continuous = true;
  sr.interimResults = true;

  sr.onstart = () => {
    isOn = true;
    document.getElementById('startBtn').textContent = '停止传译';
    document.getElementById('startBtn').className = 'start-btn on';
    document.getElementById('statusBar').style.display = 'flex';
    document.getElementById('statusTxt').textContent = '正在监听，请说英文...';
  };

  sr.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    const display = final || interim;
    if (display) setEnTxt(display);
    if (final) {
      clearTimeout(translateTimer);
      doTranslate(final);
    } else if (interim) {
      clearTimeout(translateTimer);
      translateTimer = setTimeout(() => doTranslate(interim), 1200);
    }
  };

  sr.onerror = (e) => {
    if (e.error === 'not-allowed') {
      showErr('麦克风权限被拒绝，请点击地址栏左边的锁头图标，把麦克风改为允许，然后刷新页面。');
      stop();
    } else if (e.error !== 'no-speech') {
      showErr('语音识别出错：' + e.error);
    }
  };

  sr.onend = () => {
    if (isOn) try { sr.start(); } catch(e) {}
  };

  try { sr.start(); }
  catch(e) { showErr('启动失败：' + e.message); }
}

function stop() {
  isOn = false;
  if (sr) { sr.onend = null; sr.stop(); sr = null; }
  document.getElementById('startBtn').textContent = '开启同声传译';
  document.getElementById('startBtn').className = 'start-btn';
  document.getElementById('statusBar').style.display = 'none';
}

async function doTranslate(text) {
  if (!text.trim()) return;
  document.getElementById('statusTxt').textContent = '翻译中...';
  document.getElementById('latestBox').className = 'latest';
  try {
    const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=en|zh';
    const res = await fetch(url);
    const data = await res.json();
    const zh = data.responseData?.translatedText;
    if (zh && data.responseStatus === 200) {
      setZhTxt(zh);
      document.getElementById('latestBox').className = 'latest done';
      addHistory(text, zh);
    } else {
      setZhTxt('翻译失败，请重试');
    }
  } catch(e) {
    setZhTxt('网络错误');
  }
  if (isOn) document.getElementById('statusTxt').textContent = '正在监听，请说英文...';
}

function setEnTxt(t) {
  const el = document.getElementById('enTxt');
  el.textContent = t; el.className = 'en-txt';
}
function setZhTxt(t) {
  const el = document.getElementById('zhTxt');
  el.textContent = t; el.className = 'zh-txt';
}
function addHistory(en, zh) {
  history.unshift({ en, zh });
  if (history.length > 50) history.pop();
  document.getElementById('histEl').style.display = '';
  document.getElementById('hList').innerHTML = history.map(h =>
    `<div class="hitem"><div class="h-en">${h.en}</div><div class="h-zh">${h.zh}</div></div>`
  ).join('');
}
function clearHist() {
  history = [];
  document.getElementById('histEl').style.display = 'none';
  document.getElementById('hList').innerHTML = '';
}
function showErr(msg) { const e = document.getElementById('errMsg'); e.textContent = msg; e.style.display = ''; }
function hideErr() { document.getElementById('errMsg').style.display = 'none'; }
</script>
</body>
</html>
