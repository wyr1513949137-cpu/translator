<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>英文 → 中文 翻译器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f4f4f2;
  color: #1a1a1a;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2.5rem 1rem;
}
.wrap { width: 100%; max-width: 700px; }
.title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 13px; color: #999; margin-bottom: 2rem; }

.mode-bar {
  display: flex; gap: 8px; margin-bottom: 1.5rem;
}
.mode-btn {
  font-size: 13px; padding: 6px 16px;
  border-radius: 20px; border: 1px solid #d0d0cc;
  background: #fff; color: #666; cursor: pointer;
  transition: all 0.15s;
}
.mode-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

/* 输入模式 */
.input-section { margin-bottom: 1.25rem; }
.input-lbl { font-size: 12px; color: #aaa; margin-bottom: 6px; letter-spacing: 0.04em; }
textarea {
  width: 100%; min-height: 110px; padding: 12px 14px;
  font-size: 15px; line-height: 1.7;
  border: 1px solid #e0e0da; border-radius: 12px;
  background: #fff; color: #1a1a1a;
  resize: vertical; outline: none;
  font-family: inherit;
  transition: border-color 0.15s;
}
textarea:focus { border-color: #aaa; }
.translate-btn {
  width: 100%; padding: 11px;
  font-size: 15px; font-weight: 500;
  background: #1a1a1a; color: #fff;
  border: none; border-radius: 10px;
  cursor: pointer; margin-bottom: 1.25rem;
  transition: background 0.15s;
}
.translate-btn:hover { background: #333; }
.translate-btn:disabled { background: #ccc; cursor: default; }

.result-box {
  background: #fff; border: 1px solid #e0e0da;
  border-radius: 12px; padding: 1rem 1.25rem;
  min-height: 100px;
}
.result-box.done { border-color: #a0c4f0; background: #f0f6fe; }
.result-lbl { font-size: 12px; color: #aaa; margin-bottom: 8px; }
.result-box.done .result-lbl { color: #3b6fd4; }
.result-txt { font-size: 15px; color: #1a1a1a; line-height: 1.7; }
.result-txt.empty { color: #ccc; font-style: italic; font-size: 13px; }
.result-txt.loading { color: #999; font-size: 13px; }

/* 语音模式 */
.voice-section { display: none; }
.voice-hint {
  background: #fff8e6; border: 1px solid #f0d080;
  border-radius: 10px; padding: 1rem 1.25rem;
  font-size: 13px; color: #7a5c00; line-height: 1.7;
  margin-bottom: 1.25rem;
}
.voice-hint strong { font-weight: 500; }
.steps { margin-top: 8px; padding-left: 1.2rem; }
.steps li { margin-bottom: 4px; }
.mic-area {
  display: flex; flex-direction: column; align-items: center;
  gap: 12px; padding: 1.5rem 0;
}
.mic-btn {
  width: 84px; height: 84px; border-radius: 50%;
  border: 1.5px solid #d0d0cc; background: #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; outline: none;
}
.mic-btn:hover { border-color: #999; }
.mic-btn.listening { background: #e8f0fc; border-color: #3b6fd4; animation: pulse 1.5s infinite; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(59,111,212,0.2); }
  50% { box-shadow: 0 0 0 12px rgba(59,111,212,0); }
}
.mic-btn svg { width: 32px; height: 32px; stroke: #555; transition: stroke 0.2s; }
.mic-btn.listening svg { stroke: #3b6fd4; }
.mic-status { font-size: 13px; color: #888; }
.mic-status.on { color: #3b6fd4; font-weight: 500; }
.interim { font-size: 13px; color: #bbb; font-style: italic; min-height: 18px; text-align: center; }

/* 通用 */
.err {
  font-size: 13px; color: #a33; background: #fceaea;
  border-radius: 8px; padding: 8px 14px; margin-bottom: 1rem; display: none;
}
.history { border-top: 1px solid #eee; padding-top: 1rem; margin-top: 1.5rem; display: none; }
.history-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.history-lbl { font-size: 12px; color: #aaa; }
.clr { font-size: 12px; color: #aaa; background: none; border: none; cursor: pointer; }
.clr:hover { color: #666; }
.hlist { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
.hitem { background: #f7f7f5; border-radius: 8px; padding: 8px 12px; }
.hen { font-size: 13px; color: #888; margin-bottom: 3px; }
.hzh { font-size: 13px; color: #1a1a1a; font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">英文 → 中文 翻译器</div>
  <p class="sub">双击即用，完全免费，无需安装任何软件</p>

  <div class="mode-bar">
    <button class="mode-btn active" id="btnText" onclick="switchMode('text')">输入文字翻译</button>
    <button class="mode-btn" id="btnVoice" onclick="switchMode('voice')">语音翻译</button>
  </div>

  <div class="err" id="errMsg"></div>

  <!-- 文字模式 -->
  <div id="textSection">
    <div class="input-section">
      <div class="input-lbl">输入英文</div>
      <textarea id="inputTxt" placeholder="在这里输入或粘贴英文内容..." oninput="onInput()"></textarea>
    </div>
    <button class="translate-btn" id="transBtn" onclick="translateInput()" disabled>翻 译</button>
    <div class="result-box" id="resultBox">
      <div class="result-lbl">中文翻译</div>
      <div class="result-txt empty" id="resultTxt">翻译结果显示在这里...</div>
    </div>
  </div>

  <!-- 语音模式 -->
  <div class="voice-section" id="voiceSection">
    <div class="voice-hint">
      <strong>语音模式使用说明</strong>
      <ol class="steps">
        <li>需要用 Chrome 浏览器，且必须通过 <strong>http://</strong> 地址打开（不能直接双击文件）</li>
        <li>如果你已经按照上面说的启动了本地服务器，访问 <code>http://localhost:8080/translator.html</code> 即可使用语音</li>
        <li>如果没有服务器，请用上方的"输入文字翻译"代替</li>
      </ol>
    </div>
    <div class="mic-area">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <div class="mic-status" id="micStatus">点击麦克风开始说英文</div>
      <div class="interim" id="interim"></div>
    </div>
    <div class="result-box" id="voiceResultBox">
      <div class="result-lbl">中文翻译</div>
      <div class="result-txt empty" id="voiceResultTxt">说英文，翻译结果显示在这里...</div>
    </div>
  </div>

  <div class="history" id="histEl">
    <div class="history-hd">
      <div class="history-lbl">翻译记录</div>
      <button class="clr" onclick="clearHist()">清除</button>
    </div>
    <div class="hlist" id="hList"></div>
  </div>
</div>

<script>
let currentMode = 'text';
let recognition = null;
let isListening = false;
let translateTimer = null;
let history = [];

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('textSection').style.display = mode === 'text' ? '' : 'none';
  document.getElementById('voiceSection').style.display = mode === 'voice' ? '' : 'none';
  document.getElementById('btnText').className = 'mode-btn' + (mode === 'text' ? ' active' : '');
  document.getElementById('btnVoice').className = 'mode-btn' + (mode === 'voice' ? ' active' : '');
  hideErr();
}

function onInput() {
  const val = document.getElementById('inputTxt').value.trim();
  document.getElementById('transBtn').disabled = !val;
}

async function translateInput() {
  const text = document.getElementById('inputTxt').value.trim();
  if (!text) return;
  const btn = document.getElementById('transBtn');
  btn.disabled = true;
  btn.textContent = '翻译中...';
  setResult('翻译中...', 'loading', false);
  document.getElementById('resultBox').className = 'result-box';
  await doTranslate(text, false);
  btn.disabled = false;
  btn.textContent = '翻 译';
}

// 支持 Enter 快捷键
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey && currentMode === 'text') {
    translateInput();
  }
});

async function doTranslate(text, isVoice) {
  try {
    const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=en|zh';
    const res = await fetch(url);
    const data = await res.json();
    const zh = data.responseData?.translatedText;
    if (zh && data.responseStatus === 200) {
      setResult(zh, '', isVoice);
      if (isVoice) document.getElementById('voiceResultBox').className = 'result-box done';
      else document.getElementById('resultBox').className = 'result-box done';
      addHistory(text, zh);
    } else {
      setResult('翻译失败，请重试', 'loading', isVoice);
    }
  } catch(e) {
    setResult('网络错误，请检查网络连接', 'loading', isVoice);
  }
}

function setResult(t, cls, isVoice) {
  const el = document.getElementById(isVoice ? 'voiceResultTxt' : 'resultTxt');
  el.textContent = t;
  el.className = 'result-txt' + (cls ? ' ' + cls : '');
}

// 语音部分
function toggleMic() {
  if (isListening) stopMic(); else startMic();
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showErr('此浏览器不支持语音识别，请用 Chrome 打开'); return; }
  hideErr();
  recognition = new SR();
  recognition.lang = 'en-AU';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').className = 'mic-btn listening';
    document.getElementById('micStatus').textContent = '正在监听，请说英文...';
    document.getElementById('micStatus').className = 'mic-status on';
  };

  recognition.onresult = (e) => {
    let interim = '', finalStr = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalStr += t;
      else interim += t;
    }
    if (interim) document.getElementById('interim').textContent = interim;
    if (finalStr) {
      document.getElementById('interim').textContent = '';
      clearTimeout(translateTimer);
      doTranslate(finalStr, true);
    } else if (interim) {
      clearTimeout(translateTimer);
      translateTimer = setTimeout(() => doTranslate(interim, true), 1500);
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'not-allowed') showErr('麦克风权限被拒绝。注意：直接双击 HTML 文件时语音无法使用，需要通过 http:// 地址打开');
    else if (e.error !== 'no-speech') showErr('语音识别出错：' + e.error);
  };

  recognition.onend = () => { if (isListening) try { recognition.start(); } catch(e) {} };
  try { recognition.start(); } catch(e) { showErr('无法启动麦克风：' + e.message); }
}

function stopMic() {
  isListening = false;
  if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
  document.getElementById('micBtn').className = 'mic-btn';
  document.getElementById('micStatus').textContent = '点击麦克风开始说英文';
  document.getElementById('micStatus').className = 'mic-status';
  document.getElementById('interim').textContent = '';
}

function addHistory(en, zh) {
  history.unshift({ en, zh });
  if (history.length > 30) history.pop();
  const el = document.getElementById('histEl');
  const list = document.getElementById('hList');
  el.style.display = '';
  list.innerHTML = history.map(h =>
    `<div class="hitem"><div class="hen">${h.en}</div><div class="hzh">${h.zh}</div></div>`
  ).join('');
}
function clearHist() {
  history = [];
  document.getElementById('histEl').style.display = 'none';
  document.getElementById('hList').innerHTML = '';
}
function showErr(msg) { const e = document.getElementById('errMsg'); e.textContent = msg; e.style.display = ''; }
function hideErr() { document.getElementById('errMsg').style.display = 'none'; }
</script>
</body>
</html>
